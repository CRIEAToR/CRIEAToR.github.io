<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos Checking | Secure Login</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="cosmos-bg"></div>
    <div class="login-wrapper">
        <form id="loginForm" class="glass-card">
            <div class="logo">🚀</div>
            <h1>COSMOS CHECKING</h1>
            
            <div class="field">
                <label for="role">Select Your Rank</label>
                <select id="role" required>
                    <option value="student">Student</option>
                    <option value="instructor">Instructor</option>
                    <option value="administrator">Administrator</option>
                </select>
            </div>

            <div class="field">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            
            <div class="field">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div id="adminSecurity" style="display: none;">
                <hr style="border-color: #334155; margin: 15px 0;">
                <p style="color: #ef4444; font-size: 0.8rem; text-transform: uppercase;">Security Clearance Required</p>
                <div class="field">
                    <input type="text" id="securityAns" placeholder="Security Passphrase">
                </div>
                <div class="field">
                    <input type="password" id="hashKey" placeholder="Enter 100-char Hash Key">
                </div>
            </div>

            <button type="submit" id="loginBtn">Initialize Access</button>
            <div id="statusMessage"></div>
        </form>
    </div>

    <div id="finalKeyModal" class="modal-overlay" style="display: none;">
        <div class="glass-card modal-content">
            <h2 style="color: #ef4444; letter-spacing: 2px;">CLEARANCE LEVEL 2</h2>
            <p style="font-size: 0.9rem; margin-bottom: 20px;">Initial verification successful. System requires Final Key to unlock Command Center.</p>
            
            <div class="field">
                <input type="password" id="finalKeyInput" placeholder="Enter 100-char Final Key">
            </div>
            
            <button id="verifyFinalKeyBtn" type="button">Authorize Override</button>
            <button id="cancelFinalKeyBtn" type="button" class="btn-cancel">Abort</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
        window.createClient = createClient;
    </script>
    <script src="script.js"></script>
</body>
</html>
